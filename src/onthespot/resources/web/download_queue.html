<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnTheSpot - Download Queue</title>
    <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="m-0 flex flex-col items-center bg-base-100 min-h-screen pb-10">
    <div class="w-full max-w-full overflow-hidden p-2" x-data="downloadQueueApp()">
        <ul class="menu menu-horizontal bg-base-200 rounded-box flex-nowrap shadow-md overflow-x-auto w-full mb-4">
            <li class="hidden sm:block"><a href="https://github.com/justin025/onthespot/" target="_blank" class="text-primary hover:bg-base-300 font-bold">OnTheSpot</a></li>
            <li><a href="/search" class="hover:bg-base-300">Search</a></li>
            <li><a href="/download_queue" class="active !text-white !bg-primary border-none">Downloads</a></li>
            <li><a href="/settings" class="hover:bg-base-300">Settings</a></li>
            <li><a href="/about" class="hover:bg-base-300">About</a></li>
        </ul>

        <div class="flex flex-col sm:flex-row items-center justify-between mb-4 w-full">
            <div class="flex items-center text-sm font-semibold mb-2 sm:mb-0">
                <span x-text="`Total Items: ${completedCount}/${totalCount}`" class="mr-4"></span>
                <span x-text="`Progress: ${percentComplete}%`"></span>
            </div>

            <div class="flex items-center flex-wrap gap-2 justify-center sm:justify-end">
                <button @click="postRequest('/api/clear_items')" class="btn btn-outline btn-sm">Clear Completed</button>
                <button @click="postRequest('/api/cancel_items')" class="btn btn-outline btn-sm btn-error">Cancel All</button>
                <button @click="postRequest('/api/retry_items')" class="btn btn-outline btn-sm btn-info">Retry Failed</button>
                <button @click="postRequest('/api/restart')" class="btn btn-outline btn-sm btn-warning">Restart Workers</button>
                <button @click="showCustomFilters = !showCustomFilters" class="btn btn-square btn-ghost btn-sm">
                    <img :src="showCustomFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w-5 h-5">
                </button>
            </div>
        </div>

        <div x-show="showCustomFilters" style="display: none;" class="mb-4">
            <div class="divider text-opacity-50">Filters</div>
            <div class="flex flex-col sm:flex-row items-center justify-between bg-base-200 p-4 rounded-box">
                <div class="flex items-center flex-wrap gap-4">
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Waiting</span> <input type="checkbox" x-model="filters.download_queue_show_waiting" class="checkbox checkbox-primary checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Failed</span> <input type="checkbox" x-model="filters.download_queue_show_failed" class="checkbox checkbox-error checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Cancelled</span> <input type="checkbox" x-model="filters.download_queue_show_cancelled" class="checkbox checkbox-warning checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Unavailable</span> <input type="checkbox" x-model="filters.download_queue_show_unavailable" class="checkbox checkbox-neutral checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Completed</span> <input type="checkbox" x-model="filters.download_queue_show_completed" class="checkbox checkbox-success checkbox-sm"></label>
                </div>
                <div class="mt-4 sm:mt-0">
                    <button @click="saveFilters" class="btn btn-square btn-ghost">
                        <img src="/icons/save.png" loading="lazy" class="w-5 h-5">
                    </button>
                </div>
            </div>
        </div>

        <div class="w-full overflow-x-auto">
            <table class="table table-zebra table-sm sm:table-md w-full min-w-[700px] shadow-lg rounded-box bg-base-200">
                <thead class="bg-base-300 text-base-content text-sm">
                    <tr>
                        <th style="display: none;">Local ID</th>
                        {% if config.show_download_thumbnails %}
                            <th>Image</th>
                        {% endif %}
                        <th @click="setSort('item_name')" class="cursor-pointer hover:bg-base-200 transition-colors">
                            Name <span x-text="getSortIndicator('item_name')" class="inline-block w-4 text-center"></span>
                        </th>
                        <th @click="setSort('parent_category')" class="cursor-pointer hover:bg-base-200 transition-colors hidden sm:table-cell">
                            By <span x-text="getSortIndicator('parent_category')" class="inline-block w-4 text-center"></span>
                        </th>
                        <th @click="setSort('item_service')" class="cursor-pointer hover:bg-base-200 transition-colors">
                            Service <span x-text="getSortIndicator('item_service')" class="inline-block w-4 text-center"></span>
                        </th>
                        <th @click="setSort('item_status')" class="cursor-pointer hover:bg-base-200 transition-colors">
                            Status <span x-text="getSortIndicator('item_status')" class="inline-block w-4 text-center"></span>
                        </th>
                        <th @click="setSort('progress')" class="cursor-pointer hover:bg-base-200 transition-colors hidden sm:table-cell">
                            Progress <span x-text="getSortIndicator('progress')" class="inline-block w-4 text-center"></span>
                        </th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(item, index) in filteredAndSortedItems" :key="item.local_id">
                        <tr class="hover">
                            <td style="display: none;" x-text="item.local_id"></td>
                            {% if config.show_download_thumbnails %}
                                <td>
                                    <template x-if="item.item_thumbnail">
                                        <img :src="item.item_thumbnail" loading="lazy" class="rounded object-cover" :style="'width: ' + {{ config.thumbnail_size }} + 'px; height: ' + {{ config.thumbnail_size }} + 'px;'">
                                    </template>
                                </td>
                            {% endif %}
                            <td class="font-medium max-w-[200px] truncate" x-text="item.item_name"></td>
                            <td class="hidden sm:table-cell max-w-[150px] truncate" x-text="capitalizeFirstLetter(item.parent_category)"></td>
                            <td>
                                <template x-if="item.item_service">
                                    <div class="flex items-center gap-2">
                                        <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-5 h-5 align-middle">
                                        <span class="hidden sm:inline" x-text="formatServiceName(item.item_service)"></span>
                                    </div>
                                </template>
                            </td>
                            <td class="whitespace-nowrap font-medium" x-text="item.item_status || 'N/A'"></td>
                            <td class="hidden sm:table-cell w-32">
                                <progress class="progress progress-success w-full bg-base-300" :value="item.progress || 0" max="100"></progress>
                                <span class="text-xs opacity-70 block text-center mt-1 font-mono" x-text="(item.progress || 0) + '%'"></span>
                            </td>
                            <td class="whitespace-nowrap">
                                <template x-if="config.download_copy_btn">
                                    <button @click="copyToClipboard(item.item_url)" class="btn btn-square btn-ghost btn-sm mr-1"><img src="/icons/link.png" loading="lazy" class="w-4 h-4"></button>
                                </template>
                                <template x-if="!['Failed', 'Cancelled', 'Deleted', 'Already Exists', 'Downloaded'].includes(item.item_status)">
                                    <button @click="postRequest('/api/cancel/' + item.local_id)" class="btn btn-square btn-ghost btn-sm mr-1"><img src="/icons/stop.png" loading="lazy" class="w-4 h-4"></button>
                                </template>
                                <template x-if="['Failed', 'Cancelled', 'Deleted'].includes(item.item_status)">
                                    <button @click="postRequest('/api/retry/' + item.local_id)" class="btn btn-square btn-ghost btn-sm mr-1"><img src="/icons/retry.png" loading="lazy" class="w-4 h-4"></button>
                                </template>
                                <template x-if="['Downloaded', 'Already Exists'].includes(item.item_status)">
                                    <span class="inline-flex gap-1">
                                        <template x-if="config.download_open_btn">
                                            <button @click="window.location.href='/api/download/' + item.local_id" class="btn btn-square btn-ghost btn-sm"><img src="/icons/file.png" loading="lazy" class="w-4 h-4"></button>
                                        </template>
                                        <template x-if="config.download_delete_btn">
                                            <button @click="deleteRequest('/api/delete/' + item.local_id)" class="btn btn-square btn-ghost btn-sm"><img src="/icons/trash.png" loading="lazy" class="w-4 h-4"></button>
                                        </template>
                                    </span>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('downloadQueueApp', () => ({
                config: {{ config | tojson | safe }},
                items: [],
                sortColumn: null,
                sortDirection: 'asc',
                showCustomFilters: false,
                filters: {
                    download_queue_show_waiting: {% if config.download_queue_show_waiting %}true{% else %}false{% endif %},
                    download_queue_show_completed: {% if config.download_queue_show_completed %}true{% else %}false{% endif %},
                    download_queue_show_cancelled: {% if config.download_queue_show_cancelled %}true{% else %}false{% endif %},
                    download_queue_show_failed: {% if config.download_queue_show_failed %}true{% else %}false{% endif %},
                    download_queue_show_unavailable: {% if config.download_queue_show_unavailable %}true{% else %}false{% endif %},
                },
                init() {
                    this.fetchItems();
                    setInterval(() => this.fetchItems(), 2000);
                },
                fetchItems() {
                    fetch('/api/download_queue')
                        .then(r => r.json())
                        .then(data => {
                            this.items = Object.values(data);
                        });
                },
                postRequest(url) {
                    fetch(url, { method: 'POST' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                deleteRequest(url) {
                    fetch(url, { method: 'DELETE' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                saveFilters() {
                    updateSettings(this.filters);
                },
                setSort(col) {
                    if (this.sortColumn === col) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortColumn = col;
                        this.sortDirection = 'asc';
                    }
                },
                getSortIndicator(col) {
                    if (this.sortColumn === col) {
                        return this.sortDirection === 'asc' ? '▲' : '▼';
                    }
                    return '\u00A0';
                },
                get totalCount() {
                    return this.items.length;
                },
                get completedCount() {
                    return this.items.filter(i => ['Downloaded', 'Already Exists', 'Cancelled'].includes(i.item_status)).length;
                },
                get percentComplete() {
                    return this.totalCount > 0 ? ((this.completedCount / this.totalCount) * 100).toFixed(2) : 0;
                },
                get filteredAndSortedItems() {
                    let result = this.items.filter(item => {
                        if (!this.filters.download_queue_show_waiting && item.item_status === 'Waiting') return false;
                        if (!this.filters.download_queue_show_completed && (item.item_status === 'Downloaded' || item.item_status === 'Already Exists')) return false;
                        if (!this.filters.download_queue_show_cancelled && item.item_status === 'Cancelled') return false;
                        if (!this.filters.download_queue_show_failed && item.item_status === 'Failed') return false;
                        if (!this.filters.download_queue_show_unavailable && item.item_status === 'Unavailable') return false;
                        return true;
                    });
                    
                    if (this.sortColumn) {
                        result.sort((a, b) => {
                            let aVal = a[this.sortColumn];
                            let bVal = b[this.sortColumn];
                            if (this.sortColumn === 'progress') {
                                aVal = Number(aVal) || 0;
                                bVal = Number(bVal) || 0;
                            } else {
                                aVal = (aVal || '').toString().toLowerCase();
                                bVal = (bVal || '').toString().toLowerCase();
                            }
                            if (aVal < bVal) return this.sortDirection === 'asc' ? -1 : 1;
                            if (aVal > bVal) return this.sortDirection === 'asc' ? 1 : -1;
                            const aId = a.local_id || '';
                            const bId = b.local_id || '';
                            return aId.localeCompare(bId);
                        });
                    }
                    return result;
                }
            }));
        });
    </script>
</body>
</html>
