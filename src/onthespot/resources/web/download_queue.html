<!DOCTYPE html>
<html lang="en" class="bg-background text-white font-sans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnTheSpot - Download Queue</title>
    <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='twind.js') }}"></script>
    <script src="{{ url_for('static', filename='twind-setup.js') }}"></script>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="m-0 flex flex-col items-center">
    <div class="w-full" x-data="downloadQueueApp()">
        <div class="bg-[#1e1e1e] p-2.5 border border-[#333] rounded-[5px] m-2">
            <ul class="list-none p-0 m-0 flex">
                <li class="hidden sm:block mr-[15px]"><a href="https://github.com/justin025/onthespot/" target="_blank" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">OnTheSpot</a></li>
                <li class="mr-[15px]"><a href="/search" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">Search</a></li>
                <li class="mr-[15px]"><a href="/download_queue" class="no-underline px-[15px] py-2 rounded-[5px] bg-accent text-[#121212]">Downloads</a></li>
                <li class="mr-[15px]"><a href="/settings" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">Settings</a></li>
                <li class="mr-[15px]"><a href="/about" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">About</a></li>
            </ul>
        </div>

        <br>
        <div class="flex items-center justify-between mb-[15px] px-2">
            <div class="flex items-center">
                <p class="mr-[10px]" x-text="`Total Items: ${completedCount}/${totalCount} | Progress: ${percentComplete}%`"></p>
            </div>

            <div class="flex items-center">
                <button @click="postRequest('/api/clear_items')" class="hidden sm:inline-block px-5 py-3 ml-2.5 border-none rounded-[10px] bg-accent text-white cursor-pointer text-xs transition-colors hover:bg-[#777]">Clear Completed/Cancelled</button>
                <button @click="postRequest('/api/cancel_items')" class="hidden sm:inline-block px-5 py-3 ml-2.5 border-none rounded-[10px] bg-accent text-white cursor-pointer text-xs transition-colors hover:bg-[#777]">Cancel All</button>
                <button @click="postRequest('/api/retry_items')" class="hidden sm:inline-block px-5 py-3 ml-2.5 border-none rounded-[10px] bg-accent text-white cursor-pointer text-xs transition-colors hover:bg-[#777]">Retry Cancelled/Failed</button>
                <button @click="postRequest('/api/restart')" class="hidden sm:inline-block ml-2.5 px-5 py-3 border-none rounded-[10px] bg-accent text-white cursor-pointer text-xs transition-colors hover:bg-[#777]">Restart Workers</button>
                <button @click="showCustomFilters = !showCustomFilters" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer hidden sm:inline-block ml-2.5">
                    <img :src="showCustomFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w-5 h-5">
                </button>
            </div>
        </div>

        <div x-show="showCustomFilters" style="display: none;" class="mt-5 mb-[15px] px-2">
            <hr class="border border-white mb-5 w-full">
            <div class="flex items-center justify-between">
                <div class="flex items-center flex-wrap">
                    <label class="mr-[5px] ml-[15px]">Show Waiting:</label>
                    <input type="checkbox" x-model="filters.download_queue_show_waiting" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                    <label class="mr-[5px] ml-[15px]">Show Failed:</label>
                    <input type="checkbox" x-model="filters.download_queue_show_failed" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                    <label class="mr-[5px] ml-[15px]">Show Cancelled:</label>
                    <input type="checkbox" x-model="filters.download_queue_show_cancelled" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                    <label class="mr-[5px] ml-[15px]">Show Unavailable:</label>
                    <input type="checkbox" x-model="filters.download_queue_show_unavailable" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                    <label class="mr-[5px] ml-[15px]">Show Completed:</label>
                    <input type="checkbox" x-model="filters.download_queue_show_completed" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                </div>
                <div class="flex items-center">
                    <button @click="saveFilters" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer ml-2">
                        <img src="/icons/save.png" loading="lazy" class="w-5 h-5">
                    </button>
                </div>
            </div>
        </div>

        <table class="w-full border-collapse">
            <thead>
                <tr>
                    <th style="display: none;">Local ID</th>
                    {% if config.show_download_thumbnails %}
                        <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Image</th>
                    {% endif %}
                    <th @click="setSort('item_name')" class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] cursor-pointer min-w-[12ch]">
                        Name <span x-text="getSortIndicator('item_name')" class="inline-block w-[1.2em] text-center"></span>
                    </th>
                    <th @click="setSort('parent_category')" class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] cursor-pointer min-w-[8ch] hidden sm:table-cell">
                        By <span x-text="getSortIndicator('parent_category')" class="inline-block w-[1.2em] text-center"></span>
                    </th>
                    <th @click="setSort('item_service')" class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] cursor-pointer min-w-[8ch]">
                        Service <span x-text="getSortIndicator('item_service')" class="inline-block w-[1.2em] text-center"></span>
                    </th>
                    <th @click="setSort('item_status')" class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] cursor-pointer min-w-[16ch]">
                        Status <span x-text="getSortIndicator('item_status')" class="inline-block w-[1.2em] text-center"></span>
                    </th>
                    <th @click="setSort('progress')" class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] cursor-pointer min-w-[12em] hidden sm:table-cell">
                        Progress <span x-text="getSortIndicator('progress')" class="inline-block w-[1.2em] text-center"></span>
                    </th>
                    <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Action</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="(item, index) in filteredAndSortedItems" :key="item.local_id">
                    <tr :class="index % 2 === 0 ? 'bg-rowEven' : 'bg-rowOdd'">
                        <td style="display: none;" x-text="item.local_id"></td>
                        {% if config.show_download_thumbnails %}
                            <td class="border-2 border-[#1f1f1f] p-2">
                                <template x-if="item.item_thumbnail">
                                    <img :src="item.item_thumbnail" loading="lazy" style="width: {{ config.thumbnail_size }}px; height: {{ config.thumbnail_size }}px;">
                                </template>
                            </td>
                        {% endif %}
                        <td class="border-2 border-[#1f1f1f] p-2 max-w-[200px] truncate" x-text="item.item_name"></td>
                        <td class="border-2 border-[#1f1f1f] p-2 hidden sm:table-cell" x-text="capitalizeFirstLetter(item.parent_category)"></td>
                        <td class="border-2 border-[#1f1f1f] p-2">
                            <template x-if="item.item_service">
                                <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-5 h-5 mr-1 align-middle">
                            </template>
                            <span class="hidden sm:inline align-middle" x-text="formatServiceName(item.item_service)"></span>
                        </td>
                        <td class="border-2 border-[#1f1f1f] p-2 whitespace-nowrap" x-text="item.item_status || 'N/A'"></td>
                        <td class="border-2 border-[#1f1f1f] p-2 hidden sm:table-cell">
                            <div class="w-full bg-[#777] rounded-[5px] relative">
                                <div class="font-bold text-center bg-[#4caf50] h-5 rounded-[5px]" :style="'width: ' + (item.progress || 0) + '%'" x-text="(item.progress || 0) + '%'"></div>
                            </div>
                        </td>
                        <td class="border-2 border-[#1f1f1f] p-2 whitespace-nowrap">
                            <template x-if="config.download_copy_btn">
                                <button @click="copyToClipboard(item.item_url)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1"><img src="/icons/link.png" loading="lazy" class="w-5 h-5"></button>
                            </template>
                            <template x-if="!['Failed', 'Cancelled', 'Deleted', 'Already Exists', 'Downloaded'].includes(item.item_status)">
                                <button @click="postRequest('/api/cancel/' + item.local_id)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1"><img src="/icons/stop.png" loading="lazy" class="w-5 h-5"></button>
                            </template>
                            <template x-if="['Failed', 'Cancelled', 'Deleted'].includes(item.item_status)">
                                <button @click="postRequest('/api/retry/' + item.local_id)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1"><img src="/icons/retry.png" loading="lazy" class="w-5 h-5"></button>
                            </template>
                            <template x-if="['Downloaded', 'Already Exists'].includes(item.item_status)">
                                <span class="inline-flex">
                                    <template x-if="config.download_open_btn">
                                        <button @click="window.location.href='/api/download/' + item.local_id" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1"><img src="/icons/file.png" loading="lazy" class="w-5 h-5"></button>
                                    </template>
                                    <template x-if="config.download_delete_btn">
                                        <button @click="deleteRequest('/api/delete/' + item.local_id)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1"><img src="/icons/trash.png" loading="lazy" class="w-5 h-5"></button>
                                    </template>
                                </span>
                            </template>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('downloadQueueApp', () => ({
                config: {{ config | tojson | safe }},
                items: [],
                sortColumn: null,
                sortDirection: 'asc',
                showCustomFilters: false,
                filters: {
                    download_queue_show_waiting: {% if config.download_queue_show_waiting %}true{% else %}false{% endif %},
                    download_queue_show_completed: {% if config.download_queue_show_completed %}true{% else %}false{% endif %},
                    download_queue_show_cancelled: {% if config.download_queue_show_cancelled %}true{% else %}false{% endif %},
                    download_queue_show_failed: {% if config.download_queue_show_failed %}true{% else %}false{% endif %},
                    download_queue_show_unavailable: {% if config.download_queue_show_unavailable %}true{% else %}false{% endif %},
                },
                init() {
                    this.fetchItems();
                    setInterval(() => this.fetchItems(), 2000);
                },
                fetchItems() {
                    fetch('/api/download_queue')
                        .then(r => r.json())
                        .then(data => {
                            this.items = Object.values(data);
                        });
                },
                postRequest(url) {
                    fetch(url, { method: 'POST' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                deleteRequest(url) {
                    fetch(url, { method: 'DELETE' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                saveFilters() {
                    updateSettings(this.filters);
                },
                setSort(col) {
                    if (this.sortColumn === col) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortColumn = col;
                        this.sortDirection = 'asc';
                    }
                },
                getSortIndicator(col) {
                    if (this.sortColumn === col) {
                        return this.sortDirection === 'asc' ? '▲' : '▼';
                    }
                    return '\u00A0';
                },
                get totalCount() {
                    return this.items.length;
                },
                get completedCount() {
                    return this.items.filter(i => ['Downloaded', 'Already Exists', 'Cancelled'].includes(i.item_status)).length;
                },
                get percentComplete() {
                    return this.totalCount > 0 ? ((this.completedCount / this.totalCount) * 100).toFixed(2) : 0;
                },
                get filteredAndSortedItems() {
                    let result = this.items.filter(item => {
                        if (!this.filters.download_queue_show_waiting && item.item_status === 'Waiting') return false;
                        if (!this.filters.download_queue_show_completed && (item.item_status === 'Downloaded' || item.item_status === 'Already Exists')) return false;
                        if (!this.filters.download_queue_show_cancelled && item.item_status === 'Cancelled') return false;
                        if (!this.filters.download_queue_show_failed && item.item_status === 'Failed') return false;
                        if (!this.filters.download_queue_show_unavailable && item.item_status === 'Unavailable') return false;
                        return true;
                    });
                    
                    if (this.sortColumn) {
                        result.sort((a, b) => {
                            let aVal = a[this.sortColumn];
                            let bVal = b[this.sortColumn];
                            if (this.sortColumn === 'progress') {
                                aVal = Number(aVal) || 0;
                                bVal = Number(bVal) || 0;
                            } else {
                                aVal = (aVal || '').toString().toLowerCase();
                                bVal = (bVal || '').toString().toLowerCase();
                            }
                            if (aVal < bVal) return this.sortDirection === 'asc' ? -1 : 1;
                            if (aVal > bVal) return this.sortDirection === 'asc' ? 1 : -1;
                            const aId = a.local_id || '';
                            const bId = b.local_id || '';
                            return aId.localeCompare(bId);
                        });
                    }
                    return result;
                }
            }));
        });
    </script>
</body>
</html>
