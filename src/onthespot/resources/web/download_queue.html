<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnTheSpot - Download Queue</title>
    <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
    <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
    <link href="{{ url_for('static', filename='daisyui.min.css') }}" rel="stylesheet" type="text/css" />
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet" type="text/css" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body class="m-0 flex flex-col items-center bg-base-300 min-h-screen pb-10">
    <div class="w-full max-w-full overflow-hidden p-2" x-data="downloadQueueApp()">
        <ul class="menu menu-horizontal bg-base-100 rounded-box flex-nowrap shadow-lg overflow-x-auto w-full mb-4">
            <li class="hidden sm:block"><a href="https://github.com/justin025/onthespot/" target="_blank" class="text-primary hover:bg-base-200 font-bold">OnTheSpot</a></li>
            <li><a href="/search" class="hover:bg-base-200">Search</a></li>
            <li><a href="/download_queue" class="active bg-primary text-primary-content shadow-sm font-semibold pointer-events-none">Downloads</a></li>
            <li><a href="/settings" class="hover:bg-base-200">Settings</a></li>
            <li><a href="/about" class="hover:bg-base-200">About</a></li>
        </ul>

        <div class="flex flex-col sm:flex-row items-center justify-between mb-4 w-full" x-show="totalCount > 0" style="display: none;">
            <div class="flex items-center text-sm font-semibold mb-2 sm:mb-0">
                <span x-text="`Total Items: ${completedCount}/${totalCount}`" class="mr-4"></span>
                <span x-text="`Progress: ${percentComplete}%`"></span>
            </div>

            <div class="flex items-center flex-wrap gap-2 justify-center sm:justify-end">
                <button @click="postRequest('/api/clear_items')" class="btn btn-outline btn-sm">Clear Completed</button>
                <button @click="postRequest('/api/cancel_items')" class="btn btn-outline btn-sm btn-error">Cancel All</button>
                <button @click="postRequest('/api/retry_items')" class="btn btn-outline btn-sm btn-info">Retry Failed</button>
                <button @click="postRequest('/api/restart')" class="btn btn-outline btn-sm btn-warning">Restart Workers</button>
                <button @click="showCustomFilters = !showCustomFilters" class="btn btn-square btn-ghost btn-sm">
                    <img :src="showCustomFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w-5 h-5">
                </button>
            </div>
        </div>

        <div x-show="showCustomFilters && totalCount > 0" style="display: none;" class="mb-4">
            <div class="divider text-opacity-50">Filters</div>
            <div class="flex flex-col sm:flex-row items-center justify-between bg-base-100 p-4 rounded-box shadow-md">
                <div class="flex items-center flex-wrap gap-4">
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Waiting</span> <input type="checkbox" x-model="filters.download_queue_show_waiting" class="checkbox checkbox-primary checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Failed</span> <input type="checkbox" x-model="filters.download_queue_show_failed" class="checkbox checkbox-error checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Cancelled</span> <input type="checkbox" x-model="filters.download_queue_show_cancelled" class="checkbox checkbox-warning checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Unavailable</span> <input type="checkbox" x-model="filters.download_queue_show_unavailable" class="checkbox checkbox-neutral checkbox-sm"></label>
                    <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Show Completed</span> <input type="checkbox" x-model="filters.download_queue_show_completed" class="checkbox checkbox-success checkbox-sm"></label>
                </div>
                <div class="mt-4 sm:mt-0">
                    <button @click="saveFilters" class="btn btn-square btn-ghost">
                        <img src="/icons/save.png" loading="lazy" class="w-5 h-5">
                    </button>
                </div>
            </div>
        </div>

        <div class="w-full">
            <ul class="list bg-base-100 rounded-box shadow-lg mx-auto max-w-7xl">
                <template x-if="totalCount > 0">
                    <li class="p-4 pb-2 text-xs opacity-60 tracking-wide flex justify-between items-center">
                        <span>Download Queue</span>
                        <div class="flex gap-4">
                            <!-- Sort buttons -->
                            <button @click="setSort('item_name')" class="hover:text-primary transition-colors flex items-center gap-1 font-semibold">
                                Name <span x-text="getSortIndicator('item_name')" class="w-3 text-center"></span>
                            </button>
                            <button @click="setSort('item_status')" class="hover:text-primary transition-colors flex items-center gap-1 font-semibold">
                                Status <span x-text="getSortIndicator('item_status')" class="w-3 text-center"></span>
                            </button>
                            <button @click="setSort('progress')" class="hover:text-primary transition-colors flex items-center gap-1 hidden sm:flex font-semibold">
                                Progress <span x-text="getSortIndicator('progress')" class="w-3 text-center"></span>
                            </button>
                        </div>
                    </li>
                </template>
                <template x-if="totalCount === 0">
                    <li class="p-8 text-center text-sm opacity-60 font-medium">
                        No active downloads
                    </li>
                </template>

                <template x-for="(item, index) in filteredAndSortedItems" :key="item.local_id">
                    <li class="list-row">
                        <template x-if="config.show_download_thumbnails">
                            <div>
                                <template x-if="item.item_thumbnail">
                                    <img :src="item.item_thumbnail" loading="lazy" class="rounded object-cover aspect-square" :style="'width: ' + config.thumbnail_size + 'px; height: ' + config.thumbnail_size + 'px;'">
                                </template>
                            </div>
                        </template>
                        
                        <div class="">
                            <div class="font-medium truncate" x-text="item.item_name"></div>
                            <div class="text-xs uppercase font-semibold opacity-60 flex items-center gap-1 mt-1 truncate">
                                <template x-if="item.parent_category">
                                    <span class="truncate" x-text="capitalizeFirstLetter(item.parent_category)"></span>
                                </template>
                                
                                <template x-if="item.item_service">
                                    <span class="inline-flex items-center gap-1 flex-shrink-0">
                                        <span x-show="item.parent_category">•</span>
                                        <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-3 h-3 opacity-80 min-w-[12px]">
                                        <span x-text="formatServiceName(item.item_service)"></span>
                                    </span>
                                </template>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <span :class="{
                                'text-success': item.item_status === 'Downloaded',
                                'text-error': item.item_status === 'Failed',
                                'text-warning': item.item_status === 'Cancelled' || item.item_status === 'Already Exists',
                            }" x-text="item.item_status || 'N/A'"></span>
                        </div>

                        <div class="hidden sm:flex flex-col justify-center min-w-32">
                            <progress class="progress progress-success w-full bg-base-200" :value="item.progress || 0" max="100"></progress>
                            <span class="text-xs opacity-70 text-center mt-1 font-mono" x-text="(item.progress || 0) + '%'"></span>
                        </div>

                        <div class="flex flex-nowrap items-center min-w-max">
                            <template x-if="config.download_copy_btn">
                                <button @click="copyToClipboard(item.item_url)" class="btn btn-square btn-ghost btn-sm mr-1" title="Copy Link"><img src="/icons/link.png" loading="lazy" class="w-4 h-4"></button>
                            </template>
                            <template x-if="!['Failed', 'Cancelled', 'Deleted', 'Already Exists', 'Downloaded'].includes(item.item_status)">
                                <button @click="postRequest('/api/cancel/' + item.local_id)" class="btn btn-square btn-ghost btn-sm mr-1" title="Cancel"><img src="/icons/stop.png" loading="lazy" class="w-4 h-4"></button>
                            </template>
                            <template x-if="['Failed', 'Cancelled', 'Deleted'].includes(item.item_status)">
                                <button @click="postRequest('/api/retry/' + item.local_id)" class="btn btn-square btn-ghost btn-sm mr-1" title="Retry"><img src="/icons/retry.png" loading="lazy" class="w-4 h-4"></button>
                            </template>
                            <template x-if="['Downloaded', 'Already Exists'].includes(item.item_status)">
                                <div class="inline-flex">
                                    <template x-if="config.download_open_btn">
                                        <button @click="window.location.href='/api/download/' + item.local_id" class="btn btn-square btn-ghost btn-sm mr-1" title="Open"><img src="/icons/file.png" loading="lazy" class="w-4 h-4"></button>
                                    </template>
                                    <template x-if="config.download_delete_btn">
                                        <button @click="deleteRequest('/api/delete/' + item.local_id)" class="btn btn-square btn-ghost btn-sm" title="Delete"><img src="/icons/trash.png" loading="lazy" class="w-4 h-4"></button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </li>
                </template>
            </ul>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('downloadQueueApp', () => ({
                config: {},
                items: [],
                sortColumn: null,
                sortDirection: 'asc',
                showCustomFilters: false,
                filters: {
                    download_queue_show_waiting: true,
                    download_queue_show_completed: true,
                    download_queue_show_cancelled: true,
                    download_queue_show_failed: true,
                    download_queue_show_unavailable: true,
                },
                init() {
                    fetch('/api/config')
                        .then(r => r.json())
                        .then(data => {
                            this.config = data.config || {};
                            this.filters.download_queue_show_waiting = !!this.config.download_queue_show_waiting;
                            this.filters.download_queue_show_completed = !!this.config.download_queue_show_completed;
                            this.filters.download_queue_show_cancelled = !!this.config.download_queue_show_cancelled;
                            this.filters.download_queue_show_failed = !!this.config.download_queue_show_failed;
                            this.filters.download_queue_show_unavailable = !!this.config.download_queue_show_unavailable;
                        });
                    this.fetchItems();
                    this.initSSE();
                },
                initSSE() {
                    if (this.evtSource) {
                        this.evtSource.close();
                    }
                    this.evtSource = new EventSource('/api/download_queue/stream');
                    this.evtSource.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        this.items = Object.values(data);
                    };
                    this.evtSource.onerror = (err) => {
                        console.error('SSE Error:', err);
                        this.evtSource.close();
                        setTimeout(() => this.initSSE(), 5000); // Reconnect after 5 seconds
                    };
                },
                fetchItems() {
                    fetch('/api/download_queue')
                        .then(r => r.json())
                        .then(data => {
                            this.items = Object.values(data);
                        });
                },
                postRequest(url) {
                    fetch(url, { method: 'POST' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                deleteRequest(url) {
                    fetch(url, { method: 'DELETE' }).then(r=>r.json()).then(d=>this.fetchItems());
                },
                saveFilters() {
                    updateSettings(this.filters);
                },
                setSort(col) {
                    if (this.sortColumn === col) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortColumn = col;
                        this.sortDirection = 'asc';
                    }
                },
                getSortIndicator(col) {
                    if (this.sortColumn === col) {
                        return this.sortDirection === 'asc' ? '▲' : '▼';
                    }
                    return '\u00A0';
                },
                get totalCount() {
                    return this.items.length;
                },
                get completedCount() {
                    return this.items.filter(i => ['Downloaded', 'Already Exists', 'Cancelled'].includes(i.item_status)).length;
                },
                get percentComplete() {
                    return this.totalCount > 0 ? ((this.completedCount / this.totalCount) * 100).toFixed(2) : 0;
                },
                get filteredAndSortedItems() {
                    let result = this.items.filter(item => {
                        if (!this.filters.download_queue_show_waiting && item.item_status === 'Waiting') return false;
                        if (!this.filters.download_queue_show_completed && (item.item_status === 'Downloaded' || item.item_status === 'Already Exists')) return false;
                        if (!this.filters.download_queue_show_cancelled && item.item_status === 'Cancelled') return false;
                        if (!this.filters.download_queue_show_failed && item.item_status === 'Failed') return false;
                        if (!this.filters.download_queue_show_unavailable && item.item_status === 'Unavailable') return false;
                        return true;
                    });
                    
                    if (this.sortColumn) {
                        result.sort((a, b) => {
                            let aVal = a[this.sortColumn];
                            let bVal = b[this.sortColumn];
                            if (this.sortColumn === 'progress') {
                                aVal = Number(aVal) || 0;
                                bVal = Number(bVal) || 0;
                            } else {
                                aVal = (aVal || '').toString().toLowerCase();
                                bVal = (bVal || '').toString().toLowerCase();
                            }
                            if (aVal < bVal) return this.sortDirection === 'asc' ? -1 : 1;
                            if (aVal > bVal) return this.sortDirection === 'asc' ? 1 : -1;
                            const aId = a.local_id || '';
                            const bId = b.local_id || '';
                            return aId.localeCompare(bId);
                        });
                    }
                    return result;
                }
            }));
        });
    </script>
</body>
</html>
