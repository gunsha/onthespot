<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OnTheSpot - Search</title>
        <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
        <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    </head>
    <body class="m-0 flex flex-col items-center bg-base-100 min-h-screen pb-10" x-data="{
        query: '',
        results: [],
        showFilters: false,
        filters: {
            enable_search_tracks: {% if config.enable_search_tracks %}true{% else %}false{% endif %},
            enable_search_albums: {% if config.enable_search_albums %}true{% else %}false{% endif %},
            enable_search_playlists: {% if config.enable_search_playlists %}true{% else %}false{% endif %},
            enable_search_artists: {% if config.enable_search_artists %}true{% else %}false{% endif %},
            enable_search_episodes: {% if config.enable_search_episodes %}true{% else %}false{% endif %},
            enable_search_podcasts: {% if config.enable_search_podcasts %}true{% else %}false{% endif %},
            enable_search_audiobooks: {% if config.enable_search_audiobooks %}true{% else %}false{% endif %},
        },
        submitSearch() {
            fetch(`/api/search_results?q=${encodeURIComponent(this.query)}`)
                .then(response => response.json())
                .then(data => {
                    this.results = data;
                    this.query = '';
                });
        },
        handleDownload(url) {
            fetch(`/api/parse_url/${encodeURIComponent(url)}`, {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Download successful');
                } else {
                    console.error('Download failed:', data.error);
                }
            })
            .catch(error => console.error('Error:', error));
        },
        saveFilters() {
            updateSettings(this.filters);
        }
    }">
        <div class="w-full max-w-full overflow-hidden p-2">
            <ul class="menu menu-horizontal bg-base-200 rounded-box flex-nowrap shadow-md overflow-x-auto w-full mb-4">
                <li class="hidden sm:block"><a href="https://github.com/justin025/onthespot/" target="_blank" class="text-primary hover:bg-base-300 font-bold">OnTheSpot</a></li>
                <li><a href="/search" class="active !text-white !bg-primary border-none">Search</a></li>
                <li><a href="/download_queue" class="hover:bg-base-300">Downloads</a></li>
                <li><a href="/settings" class="hover:bg-base-300">Settings</a></li>
                <li><a href="/about" class="hover:bg-base-300">About</a></li>
            </ul>

            <div class="flex items-center justify-between mb-4 px-2 w-full">
                <div class="flex items-center w-full max-w-[calc(100%-40px)]">
                    <form @submit.prevent="submitSearch()" class="flex flex-col sm:flex-row gap-2.5 items-start sm:items-center w-full">
                        <input type="text" x-model="query" placeholder="Search by name" class="input input-bordered w-full sm:max-w-[250px] focus:input-primary">
                        <button type="submit" class="btn btn-primary w-full sm:w-auto">Search</button>
                    </form>
                </div>

                <div class="flex items-center">
                    <button @click="showFilters = !showFilters" class="btn btn-square btn-ghost hidden sm:inline-flex">
                        <img :src="showFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w-5 h-5">
                    </button>
                </div>
            </div>

            <div x-show="showFilters" style="display: none;" class="mb-4">
                <div class="divider text-opacity-50">Filters</div>
                <div class="flex flex-col sm:flex-row items-center justify-between bg-base-200 p-4 rounded-box">
                    <div class="flex items-center flex-wrap gap-4 outline-none">
                        <span class="font-semibold hidden sm:inline-flex">Search For:</span>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Tracks</span> <input type="checkbox" x-model="filters.enable_search_tracks" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Albums</span> <input type="checkbox" x-model="filters.enable_search_albums" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Playlists</span> <input type="checkbox" x-model="filters.enable_search_playlists" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Artists</span> <input type="checkbox" x-model="filters.enable_search_artists" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Episodes</span> <input type="checkbox" x-model="filters.enable_search_episodes" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Podcasts</span> <input type="checkbox" x-model="filters.enable_search_podcasts" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Audiobooks</span> <input type="checkbox" x-model="filters.enable_search_audiobooks" class="checkbox checkbox-primary checkbox-sm"></label>
                    </div>
                    <div class="mt-4 sm:mt-0">
                        <button @click="saveFilters()" class="btn btn-square btn-ghost">
                            <img src="/icons/save.png" loading="lazy" class="w-5 h-5">
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full overflow-x-auto">
                <table class="table table-zebra table-sm sm:table-md w-full shadow-lg rounded-box bg-base-200">
                    <thead class="bg-base-300 text-base-content text-sm">
                        <tr>
                            {% if config.show_search_thumbnails %}
                            <th class="w-16">Image</th>
                            {% endif %}
                            <th>Name</th>
                            <th class="hidden md:table-cell">By</th>
                            <th class="hidden sm:table-cell">Type</th>
                            <th>Service</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(item, index) in results" :key="index">
                            <tr class="hover">
                                {% if config.show_search_thumbnails %}
                                <td>
                                    <template x-if="item.item_thumbnail_url">
                                        <img :src="item.item_thumbnail_url" loading="lazy" class="rounded object-cover min-w-[32px]" :style="'width: ' + {{ config.thumbnail_size }} + 'px; height: ' + {{ config.thumbnail_size }} + 'px;'">
                                    </template>
                                </td>
                                {% endif %}
                                <td class="max-w-[140px] sm:max-w-xs truncate">
                                    <div class="font-medium truncate" x-text="item.item_name"></div>
                                    <div class="text-xs opacity-70 truncate md:hidden" x-text="(item.item_by ? item.item_by + ' • ' : '') + capitalizeFirstLetter(item.item_type)"></div>
                                </td>
                                <td class="hidden md:table-cell max-w-[200px] truncate" x-text="item.item_by"></td>
                                <td class="hidden sm:table-cell" x-text="capitalizeFirstLetter(item.item_type)"></td>
                                <td>
                                    <template x-if="item.item_service">
                                        <div class="flex items-center gap-2">
                                            <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-5 h-5 min-w-[20px]">
                                            <span class="hidden sm:inline" x-text="formatServiceName(item.item_service)"></span>
                                        </div>
                                    </template>
                                    <template x-if="!item.item_service">
                                        <span class="hidden sm:inline" x-text="formatServiceName(item.item_service)"></span>
                                    </template>
                                </td>
                                <td class="whitespace-nowrap">
                                    <button @click="copyToClipboard(item.item_url)" class="btn btn-square btn-ghost btn-sm mr-1">
                                        <img src="icons/link.png" loading="lazy" alt="Copy Link" class="w-4 h-4">
                                    </button>
                                    <button @click="handleDownload(item.item_url)" class="btn btn-square btn-ghost btn-sm">
                                        <img src="icons/download.png" loading="lazy" alt="Download" class="w-4 h-4">
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
