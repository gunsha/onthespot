<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OnTheSpot - Search</title>
        <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
        <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
        <link href="{{ url_for('static', filename='daisyui.min.css') }}" rel="stylesheet" type="text/css" />
        <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet" type="text/css" />
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    </head>
    <body class="m-0 flex flex-col items-center bg-base-300 min-h-screen pb-10" x-data="{
        query: '',
        results: [],
        showFilters: false,
        config: {},
        filters: {
            enable_search_tracks: false,
            enable_search_albums: false,
            enable_search_playlists: false,
            enable_search_artists: false,
            enable_search_episodes: false,
            enable_search_podcasts: false,
            enable_search_audiobooks: false,
        },
        init() {
            fetch('/api/config').then(r => r.json()).then(d => {
                this.config = d.config || {};
                this.filters.enable_search_tracks = !!this.config.enable_search_tracks;
                this.filters.enable_search_albums = !!this.config.enable_search_albums;
                this.filters.enable_search_playlists = !!this.config.enable_search_playlists;
                this.filters.enable_search_artists = !!this.config.enable_search_artists;
                this.filters.enable_search_episodes = !!this.config.enable_search_episodes;
                this.filters.enable_search_podcasts = !!this.config.enable_search_podcasts;
                this.filters.enable_search_audiobooks = !!this.config.enable_search_audiobooks;
            });
        },
        submitSearch() {
            fetch(`/api/search_results?q=${encodeURIComponent(this.query)}`)
                .then(response => response.json())
                .then(data => {
                    this.results = data;
                    this.query = '';
                });
        },
        handleDownload(url) {
            fetch(`/api/parse_url/${encodeURIComponent(url)}`, {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Download successful');
                } else {
                    console.error('Download failed:', data.error);
                }
            })
            .catch(error => console.error('Error:', error));
        },
        saveFilters() {
            updateSettings(this.filters);
        }
    }">
        <div class="w-full max-w-full overflow-hidden p-2">
            <ul class="menu menu-horizontal bg-base-100 rounded-box flex-nowrap shadow-lg overflow-x-auto w-full mb-4">
                <li class="hidden sm:block"><a href="https://github.com/justin025/onthespot/" target="_blank" class="text-primary hover:bg-base-200 font-bold">OnTheSpot</a></li>
                <li><a href="/search" class="active bg-primary text-primary-content shadow-sm font-semibold pointer-events-none">Search</a></li>
                <li><a href="/download_queue" class="hover:bg-base-200">Downloads</a></li>
                <li><a href="/settings" class="hover:bg-base-200">Settings</a></li>
                <li><a href="/about" class="hover:bg-base-200">About</a></li>
            </ul>

            <div class="grid grid-cols-[1fr_auto] gap-2 mb-4 px-2 w-full max-w-3xl mx-auto">
                <form @submit.prevent="submitSearch()" class="flex flex-col sm:flex-row gap-2.5 items-center w-full">
                    <input type="text" x-model="query" placeholder="Search by name" class="input input-bordered w-full focus:input-primary">
                    <button type="submit" class="btn btn-primary w-full sm:w-auto">Search</button>
                </form>

                <div class="flex items-start sm:items-center">
                    <button @click="showFilters = !showFilters" class="btn btn-square btn-ghost">
                        <img :src="showFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w-5 h-5">
                    </button>
                </div>
            </div>

            <div x-show="showFilters" style="display: none;" class="mb-4">
                <div class="divider text-opacity-50">Filters</div>
                <div class="flex flex-col sm:flex-row items-center justify-between bg-base-100 p-4 rounded-box max-w-3xl mx-auto shadow-md">
                    <div class="flex items-center flex-wrap gap-4 outline-none">
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Tracks</span> <input type="checkbox" x-model="filters.enable_search_tracks" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Albums</span> <input type="checkbox" x-model="filters.enable_search_albums" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Playlists</span> <input type="checkbox" x-model="filters.enable_search_playlists" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Artists</span> <input type="checkbox" x-model="filters.enable_search_artists" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Episodes</span> <input type="checkbox" x-model="filters.enable_search_episodes" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Podcasts</span> <input type="checkbox" x-model="filters.enable_search_podcasts" class="checkbox checkbox-primary checkbox-sm"></label>
                        <label class="cursor-pointer label p-0 gap-2"><span class="label-text">Audiobooks</span> <input type="checkbox" x-model="filters.enable_search_audiobooks" class="checkbox checkbox-primary checkbox-sm"></label>
                    </div>
                    <div class="mt-4 sm:mt-0 ml-auto flex-shrink-0">
                        <button @click="saveFilters(); showFilters = false" class="btn btn-primary btn-sm px-6">OK</button>
                    </div>
                </div>
            </div>

            <div class="w-full">
                <ul class="list bg-base-100 rounded-box shadow-lg mx-auto max-w-7xl">
                    <template x-if="results.length > 0">
                        <li class="p-4 pb-2 text-xs opacity-60 tracking-wide">Search Results</li>
                    </template>
                    <template x-for="(item, index) in results" :key="index">
                        <li class="list-row">
                            <template x-if="config.show_search_thumbnails">
                            <div>
                                <template x-if="item.item_thumbnail_url">
                                    <img :src="item.item_thumbnail_url" loading="lazy" class="rounded object-cover aspect-square" :style="'width: ' + config.thumbnail_size + 'px; height: ' + config.thumbnail_size + 'px;'">
                                </template>
                            </div>
                            </template>
                            
                            <div>
                                <div class="font-medium truncate" x-text="item.item_name"></div>
                                <div class="text-xs uppercase font-semibold opacity-60 flex items-center gap-1 mt-1 truncate">
                                    <span class="truncate" x-text="(item.item_by ? item.item_by + ' • ' : '') + capitalizeFirstLetter(item.item_type)"></span>
                                    
                                    <template x-if="item.item_service">
                                        <span class="inline-flex items-center gap-1 flex-shrink-0">
                                            <span>•</span>
                                            <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-3 h-3 opacity-80 min-w-[12px]">
                                            <span x-text="formatServiceName(item.item_service)"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                            
                            <button @click="copyToClipboard(item.item_url)" class="btn btn-square btn-ghost" title="Copy Link">
                                <img src="icons/link.png" loading="lazy" alt="Copy Link" class="w-5 h-5">
                            </button>
                            <button @click="handleDownload(item.item_url)" class="btn btn-square btn-ghost" title="Download">
                                <img src="icons/download.png" loading="lazy" alt="Download" class="w-5 h-5">
                            </button>
                        </li>
                    </template>
                </ul>
            </div>
        </div>
    </body>
</html>
