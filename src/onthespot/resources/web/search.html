<!DOCTYPE html>
<html lang="en" class="bg-background text-white font-sans">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OnTheSpot - Search</title>
        <script src="{{ url_for('static', filename='utils.js') }}" defer></script>
        <script src="{{ url_for('static', filename='alpine.min.js') }}" defer></script>
        <script src="{{ url_for('static', filename='twind.js') }}"></script>
        <script src="{{ url_for('static', filename='twind-setup.js') }}"></script>
        <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    </head>
    <body class="m-0 flex flex-col items-center" x-data="{
        query: '',
        results: [],
        showFilters: false,
        filters: {
            enable_search_tracks: {% if config.enable_search_tracks %}true{% else %}false{% endif %},
            enable_search_albums: {% if config.enable_search_albums %}true{% else %}false{% endif %},
            enable_search_playlists: {% if config.enable_search_playlists %}true{% else %}false{% endif %},
            enable_search_artists: {% if config.enable_search_artists %}true{% else %}false{% endif %},
            enable_search_episodes: {% if config.enable_search_episodes %}true{% else %}false{% endif %},
            enable_search_podcasts: {% if config.enable_search_podcasts %}true{% else %}false{% endif %},
            enable_search_audiobooks: {% if config.enable_search_audiobooks %}true{% else %}false{% endif %},
        },
        submitSearch() {
            fetch(`/api/search_results?q=${encodeURIComponent(this.query)}`)
                .then(response => response.json())
                .then(data => {
                    this.results = data;
                    this.query = '';
                });
        },
        handleDownload(url) {
            fetch(`/api/parse_url/${encodeURIComponent(url)}`, {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Download successful');
                } else {
                    console.error('Download failed:', data.error);
                }
            })
            .catch(error => console.error('Error:', error));
        },
        saveFilters() {
            updateSettings(this.filters);
        }
    }">
        <div class="w-full">
            <div class="bg-[#1e1e1e] p-2.5 border border-[#333] rounded-[5px] m-2">
                <ul class="list-none p-0 m-0 flex">
                    <li class="hidden sm:block mr-[15px]"><a href="https://github.com/justin025/onthespot/" target="_blank" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">OnTheSpot</a></li>
                    <li class="mr-[15px]"><a href="/search" class="no-underline px-[15px] py-2 rounded-[5px] bg-accent text-[#121212]">Search</a></li>
                    <li class="mr-[15px]"><a href="/download_queue" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">Downloads</a></li>
                    <li class="mr-[15px]"><a href="/settings" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">Settings</a></li>
                    <li class="mr-[15px]"><a href="/about" class="no-underline text-[#1DB954] px-[15px] py-2 rounded-[5px] transition-colors duration-300 hover:bg-[#333]">About</a></li>
                </ul>
            </div>

            <br>

            <div class="flex items-center justify-between mb-[15px] px-2">
                <div class="flex items-center">
                    <form @submit.prevent="submitSearch()" class="flex gap-2.5 items-center">
                        <input type="text" x-model="query" placeholder="Search by name" class="bg-[#2f2f2f] text-white border-2 border-[#2f2f2f] rounded-[10px] outline-none transition-colors duration-300 text-xs w-[250px] px-3 py-2.5 focus:border-accent">
                        <button type="submit" class="px-5 py-3 border-none rounded-[10px] bg-accent text-white cursor-pointer text-xs transition-colors duration-300 hover:bg-[#777]">Search</button>
                    </form>
                </div>

                <div class="flex items-center">
                    <button @click="showFilters = !showFilters" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer font-bold text-lg leading-none hidden sm:block">
                        <img :src="showFilters ? '/icons/collapse_up.png' : '/icons/collapse_down.png'" loading="lazy" class="w5 h-5" style="width: 20px; height: 20px;">
                    </button>
                </div>
            </div>

            <div x-show="showFilters" style="display: none;" class="mt-5 mb-[15px] px-2">
                <hr class="border border-white mb-5 w-full">
                <div class="flex items-center justify-between">
                    <div class="flex items-center flex-wrap">
                        <p class="mr-[5px] ml-[15px]">Search For:</p>
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Tracks</label>
                        <input type="checkbox" x-model="filters.enable_search_tracks" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Albums</label>
                        <input type="checkbox" x-model="filters.enable_search_albums" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Playlists</label>
                        <input type="checkbox" x-model="filters.enable_search_playlists" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Artists</label>
                        <input type="checkbox" x-model="filters.enable_search_artists" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Episodes</label>
                        <input type="checkbox" x-model="filters.enable_search_episodes" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Podcasts</label>
                        <input type="checkbox" x-model="filters.enable_search_podcasts" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                        <label class="mr-[5px] ml-[15px] cursor-pointer">Audiobooks</label>
                        <input type="checkbox" x-model="filters.enable_search_audiobooks" class="w-4 h-4 text-accent bg-[#2f2f2f] border-gray-600 rounded">
                    </div>
                    <div class="flex items-center">
                        <button @click="saveFilters()" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer ml-2">
                            <img src="/icons/save.png" loading="lazy" style="width: 20px; height: 20px;">
                        </button>
                    </div>
                </div>
            </div>

            <br>
            
            <div class="w-full">
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            {% if config.show_search_thumbnails %}
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Image</th>
                            {% endif %}
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Name</th>
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a] hidden sm:table-cell">By</th>
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Type</th>
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Service</th>
                            <th class="border-2 border-[#1f1f1f] text-left p-2 bg-[#1a1a1a]">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(item, index) in results" :key="index">
                            <tr :class="index % 2 === 0 ? 'bg-rowEven' : 'bg-rowOdd'">
                                {% if config.show_search_thumbnails %}
                                <td class="border-2 border-[#1f1f1f] p-2">
                                    <template x-if="item.item_thumbnail_url">
                                        <img :src="item.item_thumbnail_url" loading="lazy" style="width: {{ config.thumbnail_size }}px; height: {{ config.thumbnail_size }}px;">
                                    </template>
                                </td>
                                {% endif %}
                                <td class="border-2 border-[#1f1f1f] p-2" x-text="item.item_name"></td>
                                <td class="border-2 border-[#1f1f1f] p-2 hidden sm:table-cell" x-text="item.item_by"></td>
                                <td class="border-2 border-[#1f1f1f] p-2" x-text="capitalizeFirstLetter(item.item_type)"></td>
                                <td class="border-2 border-[#1f1f1f] p-2">
                                    <template x-if="item.item_service">
                                        <img :src="'/icons/' + item.item_service + '.png'" loading="lazy" class="w-[20px] h-[20px] mr-[5px] inline-block">
                                    </template>
                                    <span class="hidden sm:inline" x-text="formatServiceName(item.item_service)"></span>
                                </td>
                                <td class="border-2 border-[#1f1f1f] p-2 whitespace-nowrap">
                                    <button @click="copyToClipboard(item.item_url)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer mr-1">
                                        <img src="icons/link.png" loading="lazy" alt="Copy Link" class="w-[20px] h-[20px]">
                                    </button>
                                    <button @click="handleDownload(item.item_url)" class="border-2 border-[#555] rounded-[5px] p-[5px] bg-transparent cursor-pointer">
                                        <img src="icons/download.png" loading="lazy" alt="Download" class="w-[20px] h-[20px]">
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
